
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Upload PDFs</title>
  <style>
    body { font-family: Arial, sans-serif; display: flex; flex-direction: column; align-items: center; padding: 40px; background: #f9fafb; }
    h1 { font-size: 2rem; margin-bottom: 20px; }
    .upload-area {
      border: 2px dashed #ccc;
      padding: 40px;
      text-align: center;
      background: #fff;
      border-radius: 8px;
      width: 100%;
      max-width: 500px;
    }
    .upload-area.dragover { border-color: #3b82f6; background-color: #f0f9ff; }
    input[type="file"] { display: none; }
    .file-list { margin-top: 20px; width: 100%; max-width: 500px; }
    .file-item { padding: 10px; background: #fff; border: 1px solid #ddd; border-radius: 6px; margin-bottom: 10px; }
    button { background: #3b82f6; color: white; padding: 10px 20px; border: none; border-radius: 6px; cursor: pointer; margin-top: 20px; }
    button:hover { background: #2563eb; }
  </style>
</head>
<body>
  <h1>Upload PDFs</h1>
  <div class="upload-area" id="upload-area">
    <label for="fileElem">Drag and drop PDF files here, or click to select files</label><br/><br/>
    <input type="file" id="fileElem" multiple accept="application/pdf">
    <button onclick="uploadFiles()">Upload</button>
  </div>
  <div class="file-list" id="file-list"></div>

  <script>
    const uploadArea = document.getElementById('upload-area');
    const fileElem = document.getElementById('fileElem');
    const fileList = document.getElementById('file-list');

    uploadArea.addEventListener('click', () => fileElem.click());
    uploadArea.addEventListener('dragover', e => {
      e.preventDefault();
      uploadArea.classList.add('dragover');
    });
    uploadArea.addEventListener('dragleave', () => uploadArea.classList.remove('dragover'));
    uploadArea.addEventListener('drop', e => {
      e.preventDefault();
      uploadArea.classList.remove('dragover');
      handleFiles(e.dataTransfer.files);
    });

    fileElem.addEventListener('change', () => handleFiles(fileElem.files));

    function handleFiles(files) {
      for (const file of files) {
        const div = document.createElement('div');
        div.className = 'file-item';
        div.textContent = file.name + " – Waiting to upload...";
        fileList.appendChild(div);
      }
    }

    function uploadFiles() {
      const files = fileElem.files;
      for (const file of files) {
        const formData = new FormData();
        formData.append('file', file);
        fetch('https://melissa-backend.onrender.com/upload', {
          method: 'POST',
          body: formData
        })
        .then(response => response.text())
        .then(result => {
          const item = Array.from(fileList.children).find(child => child.textContent.includes(file.name));
          if (item) item.textContent = file.name + " – Uploaded!";
        })
        .catch(error => {
          const item = Array.from(fileList.children).find(child => child.textContent.includes(file.name));
          if (item) item.textContent = file.name + " – Upload failed.";
        });
      }
    }
  </script>
</body>
</html>
